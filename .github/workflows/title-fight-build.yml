name: TITLE FIGHT APK build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout transport repository
        uses: actions/checkout@v4

      - name: Restore verified TITLE FIGHT source
        shell: bash
        run: |
          set -euo pipefail
          cat \
            payload/part-00.b64 \
            payload/part-01.b64 \
            payload/part-02.b64 \
            payload/part-030.b64 \
            payload/part-031.b64 \
            payload/part-032.b64 \
            payload/part-033.b64 \
            payload/part-04.b64 \
            payload/part-05.b64 \
            payload/part-06.b64 \
            | base64 --decode > source.tar.xz
          echo '6874b72e5a64a892a80e0c4cbd2aebebc873431f561958b9dfb91885f5f9ee08  source.tar.xz' | sha256sum --check --strict
          mkdir project
          tar -xJf source.tar.xz -C project
          test -f project/settings.gradle.kts
          test -f project/app/build.gradle.kts
          test -f project/engine/src/main/kotlin/titlefight/FightEngine.kt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-37' 'build-tools;36.0.0'

      - name: Record environment
        working-directory: project
        shell: bash
        run: |
          set -euo pipefail
          {
            java -version
            grep '^VERSION=' gradlew || true
            grep -E 'compileSdk|targetSdk|minSdk|applicationId' app/build.gradle.kts
            sdkmanager --list_installed
          } 2>&1 | tee environment.log

      - name: Run Kotlin and Gradle tests
        working-directory: project
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace \
            :engine:compileKotlin \
            :app:testDebugUnitTest \
            :android-ui-compose:testDebugUnitTest \
            2>&1 | tee tests.log

      - name: Compile debug APK
        working-directory: project
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          ./gradlew --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee build.log

      - name: Verify, hash and stage APK
        working-directory: project
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          APK='app/build/outputs/apk/debug/app-debug.apk'
          test -s "$APK"
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose "$APK" 2>&1 | tee apksigner.log
          sha256sum "$APK" | tee title-fight-debug.apk.sha256
          cp "$APK" title-fight-debug.apk

      - name: Upload APK and evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: title-fight-build-evidence
          if-no-files-found: warn
          retention-days: 30
          path: |
            project/title-fight-debug.apk
            project/title-fight-debug.apk.sha256
            project/environment.log
            project/tests.log
            project/build.log
            project/apksigner.log
            project/app/build/reports/**
            project/android-ui-compose/build/reports/**
