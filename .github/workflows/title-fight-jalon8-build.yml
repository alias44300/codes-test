name: Title Fight Jalon 8 Build

on:
  push:
    branches: [title-fight-jalon8-reprise]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Reconstruct project and apply Jalon 8
        shell: bash
        run: |
          set -euo pipefail
          rm -rf extracted
          mkdir extracted
          unzip -q TITLE_FIGHT_CODEX_READY.zip -d extracted
          PROJECT_DIR="$(dirname "$(find extracted -name settings.gradle.kts -type f | head -n 1)")"
          test -n "$PROJECT_DIR"
          cat jalon8-patch/part-*.b64 | tr -d '\n' | base64 -d | gunzip > /tmp/jalon8.patch
          cd "$PROJECT_DIR"
          git apply --whitespace=nowarn /tmp/jalon8.patch
          printf '%s\n' "$PROJECT_DIR" > "$GITHUB_WORKSPACE/project-dir.txt"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$(cat project-dir.txt)"
          chmod +x "$PROJECT_DIR/gradlew" "$PROJECT_DIR/scripts/bootstrap-android-sdk.sh"
          cd "$PROJECT_DIR"
          ./scripts/bootstrap-android-sdk.sh

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$(cat project-dir.txt)"
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon :app:assembleDebug
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp app/build/outputs/apk/debug/app-debug.apk "$GITHUB_WORKSPACE/artifacts/title-fight-jalon8-debug.apk"
          sha256sum "$GITHUB_WORKSPACE/artifacts/title-fight-jalon8-debug.apk" | tee "$GITHUB_WORKSPACE/artifacts/title-fight-jalon8-debug.apk.sha256"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: title-fight-jalon8-apk
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30
