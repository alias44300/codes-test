name: Title Bout Career APK Build

on:
  push:
    branches: [title-bout-career-apk-build]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Extract corrected career project
        shell: bash
        run: |
          set -euo pipefail
          test -f title-bout-jalon7-step3-career-source.zip
          rm -rf extracted artifacts
          mkdir -p extracted artifacts
          unzip -q title-bout-jalon7-step3-career-source.zip -d extracted
          PROJECT_DIR="$(dirname "$(find extracted -name settings.gradle.kts -type f | head -n 1)")"
          test -n "$PROJECT_DIR"
          find "$PROJECT_DIR" -name build.gradle.kts -type f -print0 | xargs -0 sed -i 's/compileSdk = 37/compileSdk = 36/g; s/targetSdk = 37/targetSdk = 36/g'
          chmod +x "$PROJECT_DIR/gradlew"
          printf '%s\n' "$PROJECT_DIR" > project-dir.txt

      - name: Run career validation
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$(cat project-dir.txt)"
          cd "$PROJECT_DIR"
          ./scripts/test-jalon7-step3.sh
          python3 scripts/audit-jalon7-step3.py

      - name: Build corrected APK
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$(cat project-dir.txt)"
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon :app:assembleDebug
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          unzip -t "$APK" >/dev/null
          cp "$APK" "$GITHUB_WORKSPACE/artifacts/TitleBout-career-debug.apk"
          sha256sum "$GITHUB_WORKSPACE/artifacts/TitleBout-career-debug.apk" | tee "$GITHUB_WORKSPACE/artifacts/TitleBout-career-debug.apk.sha256"

      - name: Upload corrected APK
        uses: actions/upload-artifact@v4
        with:
          name: title-bout-career-apk
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30
